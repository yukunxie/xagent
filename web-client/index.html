<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>xAgent Web Client</title>

<!-- xterm.js + addons from CDN -->
<link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1e1f22;
    --bg2:       #2b2b2b;
    --bg3:       #3c3f41;
    --border:    #4e7cbf;
    --text:      #a9b7c6;
    --text-dim:  #6b7683;
    --accent:    #4e9ee7;
    --accent-bg: #214283;
    --danger:    #cc666e;
    --success:   #629755;
    --amber:     #bbb529;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* ── Connect Screen ──────────────────────────────────────────────── */
  #connect-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 24px;
  }

  .logo {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .connect-card {
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 10px;
    padding: 28px 32px;
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .connect-card label {
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
    display: block;
  }

  .connect-card input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--bg3);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .connect-card input:focus { border-color: var(--accent); }

  .hint {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: -8px;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    transition: opacity 0.15s, background 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; }
  .btn-secondary {
    background: var(--bg3); color: var(--text);
    font-size: 0.8rem; padding: 6px 14px;
  }
  .btn-danger { background: var(--danger); color: #fff; font-size: 0.8rem; padding: 6px 14px; }

  #connect-error {
    font-size: 0.8rem; color: var(--danger);
    text-align: center; min-height: 18px;
  }

  /* ── Session List Screen ─────────────────────────────────────────── */
  #session-screen {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: #18191c;
    border-bottom: 1px solid #2d2d30;
    flex-shrink: 0;
  }
  .top-bar-title { font-weight: 600; color: #e0e0e0; font-size: 0.88rem; flex: 1; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); flex-shrink: 0;
  }
  .status-dot.disconnected { background: var(--danger); }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .session-list h2 {
    font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-dim);
    margin-bottom: 4px;
  }

  .session-card {
    background: var(--bg2);
    border: 1px solid #3a3d40;
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, background 0.15s;
  }
  .session-card:hover { border-color: var(--accent); background: #313438; }

  .session-icon { font-size: 1.4rem; flex-shrink: 0; }
  .session-info { flex: 1; min-width: 0; }
  .session-cmd {
    font-weight: 600; color: #dde2e8;
    font-size: 0.875rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .session-meta {
    font-size: 0.72rem; color: var(--text-dim); margin-top: 2px;
  }
  .session-buf {
    font-size: 0.7rem;
    background: var(--bg3); border-radius: 4px;
    padding: 2px 7px; color: var(--text); flex-shrink: 0;
  }
  .badge-running {
    font-size: 0.65rem; padding: 1px 6px;
    background: rgba(98,151,85,0.18); border: 1px solid #4a7a40;
    border-radius: 4px; color: #7ec87a; flex-shrink: 0;
  }
  .badge-exited {
    font-size: 0.65rem; padding: 1px 6px;
    background: rgba(204,102,110,0.15); border: 1px solid #7a4040;
    border-radius: 4px; color: #cc8888; flex-shrink: 0;
  }

  .empty-sessions {
    text-align: center; color: var(--text-dim);
    padding: 48px 16px; font-size: 0.875rem;
  }

  /* ── History Dialog ──────────────────────────────────────────────── */
  #history-dialog {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  #history-dialog.open { display: flex; }

  .dialog-card {
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 10px;
    padding: 24px 28px;
    width: 340px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .dialog-card h3 { font-size: 0.9rem; color: #fff; margin-bottom: 6px; }
  .dialog-card p { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 16px; }

  .history-options {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
  }
  .hist-btn {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--bg3);
    background: var(--bg); color: var(--text);
    cursor: pointer; font-size: 0.8rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .hist-btn:hover, .hist-btn.active {
    border-color: var(--accent); background: var(--accent-bg); color: #fff;
  }

  .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; }

  /* ── Terminal Screen ─────────────────────────────────────────────── */
  #terminal-screen {
    display: none;
    flex-direction: column;
    height: 100%;
  }

  .term-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: #18191c; border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .term-bar-title { flex: 1; font-size: 0.82rem; color: var(--text); min-width: 0; }
  .term-bar-title strong { color: #e0e0e0; }
  .term-badge {
    font-size: 0.68rem; padding: 1px 7px;
    background: var(--accent-bg); border: 1px solid var(--accent);
    border-radius: 4px; color: #a9c9f5; flex-shrink: 0;
  }

  #terminal-container {
    flex: 1; min-height: 0; overflow: hidden;
    background: #2b2b2b; padding: 4px;
  }

  /* xterm override: make it fill the container */
  .xterm { height: 100% !important; }
  .xterm-viewport { overflow-y: hidden !important; }

  /* ── Mobile virtual keyboard shortcuts bar ─────────────────────── */
  #mobile-kb {
    display: none;         /* only shown on touch devices */
    flex-shrink: 0;
    background: #1c1d20;
    border-top: 1px solid #3a3d40;
    padding: 5px 6px;
    padding-bottom: max(5px, env(safe-area-inset-bottom, 5px));
    gap: 5px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    align-items: center;
  }
  #mobile-kb::-webkit-scrollbar { display: none; }

  .kb-btn {
    flex-shrink: 0;
    background: #3c3f41;
    color: #c8cdd3;
    border: 1px solid #505357;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
    cursor: pointer;
    min-width: 42px;
    min-height: 36px;
    text-align: center;
    scroll-snap-align: start;
    /* critical: prevent tap from stealing focus away from xterm */
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.1s;
  }
  .kb-btn:active, .kb-btn.pressed { background: var(--accent); color: #fff; border-color: var(--accent); }

  .kb-sep {
    width: 1px; height: 22px; background: #3a3d40;
    flex-shrink: 0;
  }

  /* Show keyboard bar on touch-primary devices (phones / tablets) */
  @media (hover: none) and (pointer: coarse) {
    #mobile-kb { display: flex; }
  }

  /* ── Connect/dialog cards: fluid on narrow screens ──────────────── */
  .connect-card { width: min(360px, calc(100% - 32px)); }
  .dialog-card  { width: min(340px, calc(100% - 32px)); }

  /* ── Small-screen layout tweaks ──────────────────────────────────── */
  @media (max-width: 480px) {
    .term-bar { padding: 4px 8px; }
    .btn.btn-secondary, .btn.btn-danger { padding: 5px 10px; font-size: 0.78rem; }
  }

  /* ── Scrollbar ───────────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #4a4d50; border-radius: 3px; }
</style>
</head>
<body>

<!-- ── Connect Screen ──────────────────────────────────────────── -->
<div id="connect-screen">
  <div class="logo">x<span>Agent</span> <span style="font-size:1rem;font-weight:400;color:var(--text-dim)">Web</span></div>
  <div class="connect-card">
    <div>
      <label>Server IP</label>
      <input id="ip-input" type="text" placeholder="192.168.1.100" />
    </div>
    <p class="hint">端口从 10337 开始自动探测（最多 100 个）</p>
    <div id="connect-error"></div>
    <button class="btn btn-primary" id="connect-btn">连接</button>
  </div>
</div>

<!-- ── Session List Screen ─────────────────────────────────────── -->
<div id="session-screen">
  <div class="top-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="top-bar-title" id="top-bar-title">连接中…</span>
    <button class="btn btn-secondary" id="disconnect-btn">断开</button>
  </div>
  <div class="session-list" id="session-list">
    <div class="empty-sessions">⏳ 正在获取会话列表…</div>
  </div>
</div>

<!-- ── History Mode Dialog ─────────────────────────────────────── -->
<div id="history-dialog">
  <div class="dialog-card">
    <h3>📜 同步历史内容</h3>
    <p id="dialog-buf-info">该会话有 — 的历史输出，同步多少？</p>
    <div class="history-options">
      <button class="hist-btn active" data-mode="1M">最近 1 MB</button>
      <button class="hist-btn" data-mode="5M">最近 5 MB</button>
      <button class="hist-btn" data-mode="10M">最近 10 MB</button>
      <button class="hist-btn" data-mode="all">全部</button>
      <button class="hist-btn" data-mode="none">不同步</button>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" id="dialog-cancel">取消</button>
      <button class="btn btn-primary" id="dialog-connect" style="width:auto">连接</button>
    </div>
  </div>
</div>

<!-- ── Terminal Screen ─────────────────────────────────────────── -->
<div id="terminal-screen">
  <div class="term-bar">
    <span class="term-badge">⚡ REMOTE</span>
    <span class="term-bar-title" id="term-bar-title">
      <strong>—</strong>
    </span>
    <button class="btn btn-secondary" id="kb-show-btn" title="唤起键盘">⌨️</button>
    <button class="btn btn-secondary" id="back-btn">← 返回</button>
    <button class="btn btn-danger" id="disconnect-term-btn">断开</button>
  </div>
  <div id="terminal-container"></div>

  <!-- Mobile shortcut keyboard bar — auto-shown on touch devices via CSS media query -->
  <div id="mobile-kb">
    <button class="kb-btn" data-key="esc">ESC</button>
    <button class="kb-btn" data-key="tab">TAB</button>
    <span class="kb-sep"></span>
    <button class="kb-btn" data-key="ctrl-c">^C</button>
    <button class="kb-btn" data-key="ctrl-d">^D</button>
    <button class="kb-btn" data-key="ctrl-z">^Z</button>
    <button class="kb-btn" data-key="ctrl-l">^L</button>
    <span class="kb-sep"></span>
    <button class="kb-btn" data-key="ctrl-a">^A</button>
    <button class="kb-btn" data-key="ctrl-e">^E</button>
    <button class="kb-btn" data-key="ctrl-u">^U</button>
    <button class="kb-btn" data-key="ctrl-r">^R</button>
    <span class="kb-sep"></span>
    <button class="kb-btn" data-key="up">↑</button>
    <button class="kb-btn" data-key="down">↓</button>
    <button class="kb-btn" data-key="left">←</button>
    <button class="kb-btn" data-key="right">→</button>
    <span class="kb-sep"></span>
    <button class="kb-btn" data-key="pgup">PgUp</button>
    <button class="kb-btn" data-key="pgdn">PgDn</button>
  </div>
</div>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────
function encodeB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function decodeB64(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}
function formatBytes(n) {
  if (n === 0) return '0 B';
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

// ── Touch device detection ─────────────────────────────────────────────────
const isTouchDevice = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
// Smaller font on mobile so more content fits; still readable on high-DPI screens
const TERM_FONT_SIZE = isTouchDevice ? 12 : 14;

// ── Mobile keyboard key sequences ─────────────────────────────────────────
const KEY_SEQ = {
  'esc':    '\x1b',
  'tab':    '\t',
  'ctrl-c': '\x03',   // SIGINT / interrupt
  'ctrl-d': '\x04',   // EOF / logout
  'ctrl-z': '\x1a',   // SIGTSTP / suspend
  'ctrl-l': '\x0c',   // clear screen
  'ctrl-a': '\x01',   // beginning of line
  'ctrl-e': '\x05',   // end of line
  'ctrl-u': '\x15',   // clear to beginning of line
  'ctrl-r': '\x12',   // reverse history search
  'up':     '\x1b[A',
  'down':   '\x1b[B',
  'right':  '\x1b[C',
  'left':   '\x1b[D',
  'pgup':   '\x1b[5~',
  'pgdn':   '\x1b[6~',
};

function sendKey(seq) {
  if (ws?.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: 'input', data: encodeB64(seq) }));
  // Re-focus terminal — keeps soft keyboard open and cursor active
  term?.focus();
}

// Bind shortcut bar: use touchstart+preventDefault so the terminal never
// loses focus when a shortcut button is tapped. Fall back to click for mouse.
document.querySelectorAll('.kb-btn').forEach(btn => {
  // touchstart: fire immediately, suppress focus change and mouse events
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    btn.classList.add('pressed');
    const seq = KEY_SEQ[btn.dataset.key];
    if (seq) sendKey(seq);
  }, { passive: false });

  btn.addEventListener('touchend', () => btn.classList.remove('pressed'));

  // Fallback for desktop / mouse
  btn.addEventListener('mousedown', e => {
    if (e.pointerType === 'touch') return; // already handled above
    e.preventDefault();
    const seq = KEY_SEQ[btn.dataset.key];
    if (seq) sendKey(seq);
  });
});

// ⌨️ button: explicitly focus terminal to bring up soft keyboard on iOS/Android
document.getElementById('kb-show-btn').addEventListener('click', () => term?.focus());

// ── State ──────────────────────────────────────────────────────────────────
let ws        = null;
let term      = null;
let fitAddon  = null;
let sessions  = [];
let selectedSession = null;
let historyMode     = '1M';
let connectedIp     = '';
let offsetBytes     = 0;
let resizeTimer     = null;
let loadingHistory  = false;
let serverTermSize  = null; // {rows, cols} locked by server terminal_size msg

// ── DOM refs ───────────────────────────────────────────────────────────────
const $connectScreen  = document.getElementById('connect-screen');
const $sessionScreen  = document.getElementById('session-screen');
const $termScreen     = document.getElementById('terminal-screen');
const $histDialog     = document.getElementById('history-dialog');
const $ipInput        = document.getElementById('ip-input');
const $connectBtn     = document.getElementById('connect-btn');
const $connectError   = document.getElementById('connect-error');
const $statusDot      = document.getElementById('status-dot');
const $topBarTitle    = document.getElementById('top-bar-title');
const $sessionList    = document.getElementById('session-list');
const $termContainer  = document.getElementById('terminal-container');
const $termBarTitle   = document.getElementById('term-bar-title');
const $dialogBufInfo  = document.getElementById('dialog-buf-info');
const $dialogConnect  = document.getElementById('dialog-connect');
const $dialogCancel   = document.getElementById('dialog-cancel');
const $backBtn        = document.getElementById('back-btn');
const $disconnectBtn  = document.getElementById('disconnect-btn');
const $disconnectTermBtn = document.getElementById('disconnect-term-btn');

// ── Screens ────────────────────────────────────────────────────────────────
function show(screen) {
  $connectScreen.style.display  = screen === 'connect'  ? 'flex' : 'none';
  $sessionScreen.style.display  = screen === 'sessions' ? 'flex' : 'none';
  $termScreen.style.display     = screen === 'terminal' ? 'flex' : 'none';
}

// ── Connect: try ports 10337–10436 ────────────────────────────────────────
async function tryConnect(ip) {
  for (let port = 10337; port <= 10436; port++) {
    const url = `ws://${ip}:${port}`;
    const result = await new Promise(resolve => {
      const sock = new WebSocket(url);
      const t = setTimeout(() => { sock.close(); resolve(null); }, 800);
      sock.onopen = () => {
        clearTimeout(t);
        resolve(sock);
      };
      sock.onerror = () => { clearTimeout(t); resolve(null); };
    });
    if (result) return { sock: result, port };
  }
  return null;
}

async function handleConnect() {
  const ip = $ipInput.value.trim() || '127.0.0.1';
  $connectBtn.disabled = true;
  $connectBtn.textContent = '探测端口中…';
  $connectError.textContent = '';

  const found = await tryConnect(ip);
  if (!found) {
    $connectError.textContent = `无法连接到 ${ip}（端口 10337–10436 均不可用）`;
    $connectBtn.disabled = false;
    $connectBtn.textContent = '连接';
    return;
  }

  connectedIp = ip;
  localStorage.setItem('xagent_last_ip', ip);  // remember for next visit
  ws = found.sock;
  setupWsHandlers();
  show('sessions');
  $topBarTitle.textContent = `${ip}:${found.port}`;
}

// ── WebSocket handlers (session list mode) ────────────────────────────────
function setupWsHandlers() {
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'welcome') {
        sessions = msg.sessions || [];
        renderSessionList();
        $statusDot.className = 'status-dot';
      }
    } catch {}
  };
  ws.onerror = () => onDisconnected();
  ws.onclose = () => onDisconnected();
}

function onDisconnected() {
  $statusDot.className = 'status-dot disconnected';
  if ($termScreen.style.display !== 'none' && term) {
    term.writeln('\r\n\x1b[31m[disconnected]\x1b[0m');
  }
}

// ── Session list rendering ────────────────────────────────────────────────
function renderSessionList() {
  if (sessions.length === 0) {
    $sessionList.innerHTML = '<div class="empty-sessions">远端暂无会话，请在目标机器上用 xagent 启动会话</div>';
    return;
  }

  const h2 = document.createElement('h2');
  h2.textContent = `${sessions.length} 个可用会话`;
  $sessionList.innerHTML = '';
  $sessionList.appendChild(h2);

  sessions.forEach(s => {
    const card = document.createElement('div');
    card.className = 'session-card';
    const bufText = s.buffer_bytes > 0 ? formatBytes(s.buffer_bytes) : '无历史';
    const isRunning = s.status === 'running';
    card.innerHTML = `
      <span class="session-icon">${isRunning ? '🟢' : '⚪'}</span>
      <div class="session-info">
        <div class="session-cmd">${escHtml(s.command)}</div>
        <div class="session-meta">${escHtml(s.cwd || '—')} &nbsp;·&nbsp; ID: ${s.id.slice(0, 8)}…</div>
      </div>
      <span class="session-buf">${bufText}</span>
      <span class="${isRunning ? 'badge-running' : 'badge-exited'}">${isRunning ? 'running' : 'exited'}</span>
    `;
    card.addEventListener('click', () => openHistoryDialog(s));
    $sessionList.appendChild(card);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── History dialog ────────────────────────────────────────────────────────
function openHistoryDialog(session) {
  selectedSession = session;
  const buf = session.buffer_bytes || 0;
  $dialogBufInfo.textContent = buf > 0
    ? `该会话共有 ${formatBytes(buf)} 历史输出，同步多少？`
    : '该会话暂无历史输出。';

  // Reset active button
  document.querySelectorAll('.hist-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === '1M');
  });
  historyMode = '1M';
  $histDialog.classList.add('open');
}

document.querySelectorAll('.hist-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.hist-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    historyMode = btn.dataset.mode;
  });
});

$dialogCancel.addEventListener('click', () => $histDialog.classList.remove('open'));

$dialogConnect.addEventListener('click', () => {
  $histDialog.classList.remove('open');
  openTerminal(selectedSession, historyMode);
});

// ── Terminal ──────────────────────────────────────────────────────────────
function openTerminal(session, hMode) {
  show('terminal');

  // Update header
  $termBarTitle.innerHTML = `<strong>${escHtml(session.command)}</strong> &nbsp;<span style="color:var(--text-dim);font-size:0.75rem">${escHtml(session.id.slice(0,8))}…</span>`;

  // Destroy previous terminal if any
  if (term) { term.dispose(); term = null; fitAddon = null; }
  $termContainer.innerHTML = '';
  offsetBytes = 0;
  loadingHistory = false;
  serverTermSize = null; // reset server-locked size for new session

  // Create xterm
  term = new Terminal({
    theme: {
      background: '#2b2b2b', foreground: '#a9b7c6', cursor: '#bbbbbb',
      selectionBackground: '#214283',
      black: '#3c3f41', red: '#cc666e', green: '#629755', yellow: '#bbb529',
      blue: '#6897bb', magenta: '#b55b8f', cyan: '#629755', white: '#bbbbbb',
      brightBlack: '#808080', brightRed: '#ff6b68', brightGreen: '#57a64a',
      brightYellow: '#ffe400', brightBlue: '#4e9ee7', brightMagenta: '#c878be',
      brightCyan: '#00e2e2', brightWhite: '#ffffff',
    },
    fontSize: TERM_FONT_SIZE,
    fontFamily: "'JetBrains Mono','Cascadia Code',Menlo,Monaco,Consolas,monospace",
    cursorBlink: true,
    allowProposedApi: true,
    scrollback: 5000,
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open($termContainer);
  term.focus();
  setTimeout(() => { fitAddon.fit(); sendAttach(session, hMode); }, 60);

  // Resize observer
  const observer = new ResizeObserver(entries => {
    const e = entries[0];
    if (!e || e.contentRect.width === 0 || e.contentRect.height === 0) return;
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (!fitAddon || !term) return;
      if (serverTermSize) {
        // Server owns the terminal size (local PTY session). Keep xterm at server's
        // dimensions so TUI apps like opencode render correctly.
        term.resize(serverTermSize.cols, serverTermSize.rows);
      } else {
        fitAddon.fit();
      }
      if (ws?.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
    }, 150);
  });
  observer.observe($termContainer);

  // Input
  term.onData(data => {
    if (ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'input', data: encodeB64(data) }));
  });

  // WS message handler (terminal mode)
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'output') {
        const bytes = decodeB64(msg.data);
        offsetBytes += bytes.length;
        term.write(bytes);
      } else if (msg.type === 'history_done') {
        loadingHistory = false;
        if (msg.total_bytes > 0) {
          const kb = Math.round(msg.total_bytes / 1024);
          term.write(new TextEncoder().encode(
            `\r\n\x1b[90m─── 历史回放完成 (${kb} KB) ───\x1b[0m\r\n`
          ));
        }
        setTimeout(() => term?.scrollToBottom(), 100);
      } else if (msg.type === 'terminal_size') {
        // Server tells us the actual PTY size BEFORE sending history.
        // Lock our xterm to this size so TUI content renders correctly.
        // Also cancel any pending fitAddon.fit() timer to prevent it from
        // overwriting the server-specified size.
        if (term && msg.rows > 0 && msg.cols > 0) {
          if (resizeTimer) { clearTimeout(resizeTimer); resizeTimer = null; }
          serverTermSize = { rows: msg.rows, cols: msg.cols };
          term.resize(msg.cols, msg.rows);
        }
      } else if (msg.type === 'exit') {
        term.writeln('\r\n\x1b[90m[remote process exited]\x1b[0m');
      } else if (msg.type === 'error') {
        term.writeln(`\r\n\x1b[31m[error] ${msg.message}\x1b[0m`);
      }
    } catch {}
  };
}

function sendAttach(session, hMode) {
  if (ws?.readyState !== WebSocket.OPEN) return;
  loadingHistory = true;
  ws.send(JSON.stringify({
    type:       'attach',
    session_id: session.id,
    rows:       term?.rows || 24,
    cols:       term?.cols || 80,
    offset:     0,
    history:    hMode,
  }));
}

// ── Disconnect / Back ─────────────────────────────────────────────────────
function doDisconnect() {
  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); ws = null; }
  if (term) { term.dispose(); term = null; fitAddon = null; }
  sessions = [];
  show('connect');
  $connectBtn.disabled = false;
  $connectBtn.textContent = '连接';
}

$disconnectBtn.addEventListener('click', doDisconnect);
$disconnectTermBtn.addEventListener('click', doDisconnect);

$backBtn.addEventListener('click', () => {
  // Keep WS alive, go back to session list
  if (term) { term.dispose(); term = null; fitAddon = null; }
  show('sessions');
  // Restore session-list ws handler
  setupWsHandlers();
});

// ── Init ──────────────────────────────────────────────────────────────────
$connectBtn.addEventListener('click', handleConnect);
$ipInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleConnect(); });

// Pre-fill IP from last successful connection
const _savedIp = localStorage.getItem('xagent_last_ip');
if (_savedIp) $ipInput.value = _savedIp;

show('connect');
</script>
